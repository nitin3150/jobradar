# JobRadar Docker Compose (lean local-dev variant).
#
# Production target: the Postgres database is hosted on Supabase — the
# backend service below connects to it via ``DATABASE_URL`` in ``.env``
# (Supabase's transaction-pooler URL, port 6543, is what asyncpg expects).
#
# What runs locally in Docker (lean — only what's needed to view the
# dashboard at http://localhost:3000):
#   - backend   — FastAPI + Alembic migrations at startup
#   - frontend  — Vite dev server, proxies /api -> backend
#
# What this compose file does NOT include (by design — these are out of
# scope for the dashboard-view deployment on Render):
#   - ``redis``         — was a BRPOP queue for the Playwright apply-worker.
#                         The apply-worker has been retired from this
#                         compose file because (a) the FastAPI routes
#                         serving the dashboard never consume it, and
#                         (b) ``backend/apply_worker/`` is no longer a
#                         checked-in directory. If you re-introduce the
#                         auto-apply side, run it as a separate process
#                         tree (systemd unit, Render Cron Job, etc.).
#   - ``apply-worker``  — the Playwright auto-apply process. Separate
#                         concern from "review jobs in the dashboard" —
#                         not needed by the React frontend. Lifted out
#                         because ``backend/apply_worker/main.py`` does
#                         not exist on ``main`` today.
#
# Same model for ``screenshots:`` volume — it was tied to the
# apply-worker; remove the apply-worker, remove the volume.
#
# Known gaps for the Render deployment path (left here so they're not
# silently swallowed):
#
#   1. ``./backend`` is referenced as ``build:`` context but
#      ``backend/Dockerfile`` is not checked in. ``docker compose up
#      --build`` against this file will fail on the backend service
#      until a backend/Dockerfile lands. Until then, run the backend
#      directly:
#          cd backend && uvicorn main:app --reload
#      For a container deploy, add a Dockerfile that mirrors ``main:app''
#      on uvicorn + the deps in ``backend/pyproject.toml``.
#
#   2. ``backend/main.py`` CORS ``allow_origins`` is hard-wired to
#      ``http://localhost:3000`` / ``http://127.0.0.1:3000``. Before
#      pointing the frontend at the deployed Render backend, widen
#      those origins (or read them from ``os.environ['ALLOWED_ORIGINS']``)
#      so cross-origin ``/api/*`` calls don't preflight-fail.
#
# The ``backend`` service is the only one that needs ``DATABASE_URL``
# populated; it must point at the SUPABASE_TRANSACTION_POOLER URL. The
# three Supabase env vars (``SUPABASE_URL``, ``SUPABASE_SERVICE_ROLE_KEY``,
# ``SUPABASE_ANON_KEY``) are read at process start so the resume upload
# route can write to Supabase Storage.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Resolved at first request via ``load_dotenv`` if you wire
      # backend/.env instead — these are injected from the host shell
      # via the root .env file in CI.
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env to point at your Supabase project}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    # NOTE: no ``depends_on: redis`` — the redis service was removed
    # (see header). If you re-add the apply-worker / redis pair later,
    # restore the ``depends_on:`` + ``REDIS_URL`` env var here at the
    # same time so the BRPOP queue still resolves.

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Vite dev server reads this at boot; the live ``/api/*`` proxy
      # points at the backend ``service:port`` (not localhost, because
      # dev runs the two in separate containers).
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

# No volume block — the previous ``screenshots:`` entry was the apply-worker
# output mount. With the apply-worker retired from this compose file the
# volume has no consumer; delete + re-add together if the worker returns.

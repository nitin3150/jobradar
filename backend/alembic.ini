# Alembic configuration for JobRadar.
#
# The ``sqlalchemy.url`` value here is a placeholder — ``env.py`` reads the
# real connection string from the ``DATABASE_URL`` environment variable
# (which docker-compose injects as
# ``postgresql+asyncpg://fundingradar:...@postgres:5432/fundingradar``)
# and rewrites the engine config in place before Alembic connects.
#
# Run from the ``backend`` directory:
#
#     alembic upgrade head     # apply latest migrations
#     alembic downgrade -1     # roll back one step
#     alembic current          # show current schema revision
#
# Migrations live under ``db/migrations/versions/`` and the configured
# ``script_location`` resolves that path relative to this file.

[alembic]
script_location = db/migrations
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# Migrations are wrapped in transactions by default — keep it on so a
# failed migration cleanly rolls back its half-applied DDL. Async
# migrations in particular benefit from this since partial DDL state
# is hard to recover from without it.
transaction_mode = "per_migration"

# ``sqlalchemy.url`` is overridden at runtime by env.py from DATABASE_URL.
# The literal below is a marker only — Alembic will refuse to start if
# env.py fails to rewrite it, which is the desired failure mode.
sqlalchemy.url = driver://user:pass@host/dbname


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

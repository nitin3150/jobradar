[project]
name = "fundingradar-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "redis>=5.2",
    "httpx[http2]>=0.28",
    "langgraph>=0.2",
    "anthropic>=0.49",
    "beautifulsoup4>=4.12",
    "playwright>=1.49",
    "apscheduler>=3.10,<4.0",
    "pydantic-settings>=2.7",
    "python-slugify>=8.0",
    "lxml>=5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
    "fakeredis>=2.26",
    "httpx>=0.28",
]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[build-system]
# PEP 517/621 build backend declaration. Without this block pip falls back
# to setuptools's legacy flat-layout auto-discovery, which auto-finds every
# directory containing an ``__init__.py`` and refuses to build when more than
# one top-level package is on the wire (the error Render hit with pip 25.x:
# "Multiple top-level packages discovered in a flat-layout"). Pinning
# ``setuptools.build_meta`` here makes pip use the modern backend that
# respects the explicit ``[tool.setuptools.packages.find]`` block.
#
# ``setuptools>=64`` is the floor for full PEP 621 support with the strict
# auto-discovery safety checks; older ``61.x`` builds still tolerate the
# legacy flat-layout heuristic. ``wheel`` is included so ``pip wheel .``
# (which Render does internally for the build cache) doesn't fall back to
# the legacy auto-discovery path.
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jobradar-backend"
version = "0.1.0"
description = "JobRadar FastAPI backend â€” companies, jobs, applications, scanner pipeline, Supabase persistence."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13.0",
    "asyncpg>=0.29.0",
    "bs4>=0.0.2",
    "dotenv>=0.9.9",
    "fastapi>=0.139.0",
    "langgraph>=1.2.7",
    # ``openai`` is required by ``services/llm_client.py`` â€” the scoring
    # client uses ``openai.AsyncOpenAI`` as a unified driver for BOTH
    # NVIDIA NIM (``integrate.api.nvidia.com/v1``) and Groq
    # (``api.groq.com/openai/v1``) because both vendors expose
    # OpenAI-compatible chat-completions APIs. We override ``base_url``
    # at client-construction time to swap endpoints. ``>=1.40`` is the
    # minimum that ships the AsyncOpenAI + the AuthenticationError /
    # BadRequestError / RateLimitError / NotFoundError exception set the
    # file imports. Without this line, ``pip install -e .`` (which
    # reads pyproject.toml and ignores requirements.txt) would not
    # install openai and ``from openai import â€¦`` would raise
    # ModuleNotFoundError at boards_scan import time â€” which is the
    # failure mode we're fixing right now.
    "openai>=1.40",
    # ``pyyaml`` is required by ``services/profile_service.py`` to
    # load ``config/profile.yml`` (the operator's candidate profile
    # that drives the LLM scorer). Without it the import fails at
    # route import time with a clear ``ModuleNotFoundError: yaml`` â€”
    # ``>=6.0`` is the modern release line that ships Python 3.12
    # wheels and ``safe_load``/``safe_dump`` hardening.
    "pyyaml>=6.0",
    "playwright>=1.61.0",
    "pydantic>=2.13.4",
    # ``rapidfuzz`` is the local-signal Q&A matcher used by
    # ``apply_worker.qa_matcher``. The three rapidfuzz flavors it
    # calls (``partial_ratio``, ``token_sort_ratio``,
    # ``token_set_ratio``) were chosen so the matcher can cope with
    # three distinct phrasing modes on real ATS forms: substring
    # match (long label + short pattern), word-order swap, and
    # extra-word tolerance â€” a SequenceMatcher-based fallback would
    # miss two of the three. ``>=3.0`` is the modern release line
    # that ships Python 3.12 wheels; ``<4.0`` keeps us on the v3
    # API (the v4 line ships breaking rename of ``fuzz.token_*``
    # -> ``fuzz.WRatio`` that we explicitly don't want yet).
    "rapidfuzz>=3.0,<4.0",
    # ``pypdf`` is the resume text extractor used by
    # ``services.profile_service.extract_resume_text`` when a user
    # uploads a PDF resume. The extractor catches ``ImportError``
    # and falls back to a UTF-8 decode so the upload route never
    # crashes on a missing library, but the operator will see a
    # degraded profile (binary blob â†’ U+FFFD garbage) if pypdf is
    # not installed. ``>=4.0`` is the modern release line that
    # ships Python 3.12 wheels and the page-by-page ``extract_text()``
    # API the extractor relies on. ``PdfReader`` is imported lazily
    # inside the function so test collection never requires pypdf
    # to be importable.
    "pypdf>=4.0",
    # ``python-multipart`` is required by FastAPI for any route that
    # accepts form data â€” in our case ``routes/resumes.py:@router.post
    # ("")`` uses ``UploadFile`` for resume file uploads. Without it,
    # ``uvicorn`` raises ``RuntimeError: Form data requires
    # "python-multipart" to be installed.`` at route-decorator time
    # (import time, NOT request time), which crashes the Render
    # deployment. ``>=0.0.9`` is the minimum that fixes the
    # ``TypeError: string argument without an encoding`` crash on
    # multipart parses in older 0.0.x releases.
    "python-multipart>=0.0.9",
    "sqlalchemy[asyncio]>=2.0.30",
    "supabase>=2.4.0",
    "uvicorn>=0.30.0",
]

# Test-only dependencies. Kept separate from the runtime ``dependencies``
# block above so ``pip install -e .`` (production target) doesn't pull
# in the pytest + httpx test stack. Listed under ``[dependency-groups]``
# per PEP 735 so the modern ``uv add --group test`` workflow is the
# canonical install path; the legacy ``[project.optional-dependencies]``
# block below preserves compatibility with the older
# ``pip install -e .[test]`` shape that some CI scripts still use.
[dependency-groups]
test = [
    # ``httpx`` is the in-process ASGI client used by the test suite
    # (httpx.AsyncClient + ASGITransport). Already a transitive
    # dependency of FastAPI's ``TestClient`` but pinned here so a
    # future FastAPI bump doesn't quietly swap the ASGITransport API
    # the test fixtures rely on.
    "httpx>=0.27",
    "pytest>=8.0",
    # ``pytest-asyncio`` drives the async test methods + async fixtures
    # the suite uses after the v0.5 refactor away from
    # ``asyncio.run()`` bridges in unittest.TestCase setUp hooks. The
    # ``asyncio_mode = "auto"`` setting in ``[tool.pytest.ini_options]``
    # below lets every ``async def test_*`` + ``@pytest_asyncio.fixture``
    # be recognized without per-test ``@pytest.mark.asyncio`` decoration.
    # ``>=0.23`` is the minimum that ships ``asyncio_default_fixture_loop_scope``
    # so we can pin the loop scope in one place.
    "pytest-asyncio>=0.23",
]

[project.optional-dependencies]
test = [
    "httpx>=0.27",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.uv]
# Pin a version of uv that understands the `[asyncio]` extras spec above.
required-version = ">=0.4.0"

[tool.pytest.ini_options]
# ``asyncio_mode = "auto"`` â€” every ``async def test_*`` + every
# ``@pytest_asyncio.fixture`` is recognized without per-test
# ``@pytest.mark.asyncio`` decoration. Cuts ceremony and matches
# the canonical pytest-asyncio pattern for suites that have
# already committed to async test methods.
#
# Why NOT the ``unittest.TestCase`` sync bridge the suite used to
# rely on: ``setUp`` called ``asyncio.run(coro)`` to seed the DB
# from a sync test body. With pytest-asyncio installed (the suite
# pulls it in for any future async-test author) the session loop
# is alive in the test thread, so the nested ``asyncio.run`` raises
# ``RuntimeError: asyncio.run() cannot be called from a running
# event loop``. Async fixtures + async test methods keep every
# coroutine on the same loop the runner provides.
asyncio_mode = "auto"

# Function-scoped loop matches the per-test NullPool the test
# engine in ``db/session.py`` already configures via
# ``JOBRADAR_TEST_DB=1``. Each test gets a fresh loop + fresh
# connection, so a connection bound to a previous test's closed
# loop never re-raises ``Task ... attached to a different loop``.
asyncio_default_fixture_loop_scope = "function"

# ---------------------------------------------------------------------------
# Build configuration.
#
# Explicit ``packages`` list â€” REQUIRED because setuptools â‰Ą70.x fires the
# "Multiple top-level packages discovered in a flat-layout" safety check on
# ``pip install -e .`` BEFORE consulting the ``[tool.setuptools.packages.
# find]`` directive. The legacy find directive is removed; the explicit
# list bypasses the safety check and is the only reliable build shape
# for our flat layout on newer setuptools installs (the GHA worker uses
# a recent one).
#
# OMITTED from this list (NOT installed as Python packages):
#   * data         â€” JSON state files; not code
#   * tests        â€” pytest modules; not part of distribution
#   * scripts      â€” ad-hoc entry points (boots via ``python scripts/X.py``)
#   * storage      â€” directory exists locally but is UNTRACKED in this
#                     branch, so the GHA clone doesn't have it and setuptools
#                     would refuse to install with ``package directory
#                     'storage' does not exist``. Nothing in the boards_scan
#                     runtime closure (script + runner + llm_client +
#                     settings) imports from ``storage``, so dropping it is
#                     safe. Once a separate PR ships its contents, re-add
#                     ``"storage"`` alphabetically between ``"services"``
#                     and ``"utils"``.
#
# ``models`` is included even though it lacks ``__init__.py`` because
# ``pipeline/nodes/merge.py`` and ``pipeline/graph.py`` do
# ``from models.graph_state import PipelineState``. PEP 420 namespace
# packaging (setuptools â‰Ą61) handles it: the directory is installed as
# an implicit namespace package and ``from models.X import Y`` resolves.
# Setuptools may emit a ``UserWarning`` about the missing ``__init__.py``
# â€” that's cosmetic, NOT a build failure.
# ---------------------------------------------------------------------------
# Build configuration.
#
# Dynamic-discovery form via ``[tool.setuptools.packages.find]`` â€” REQUIRED
# because pip 25.x + setuptools â‰Ą64 fire the "Multiple top-level packages
# discovered in a flat-layout" safety check BEFORE consulting the older
# ``[tool.setuptools].packages = [...]`` form. Listing ``include`` + ``exclude``
# directories explicitly bypasses the safety check and is the recommended
# shape for flat layouts in 2024+.
#
# OMITTED (via ``exclude``):
#   * data    â€” JSON state files; not code
#   * tests   â€” pytest modules; not part of distribution
#   * scripts â€” ad-hoc entry points (boots via ``python scripts/X.py``)
#   * storage â€” directory exists locally but is UNTRACKED in this branch,
#     so the GHA clone doesn't have it and setuptools would refuse to
#     install with ``package directory 'storage' does not exist``. Nothing
#     in the runtime closure imports from ``storage`` today â€” once a
#     separate PR ships its contents, remove ``storage*`` from ``exclude``.
#
# ``models`` is included even though it lacks ``__init__.py`` because
# ``pipeline/nodes/merge.py`` and ``pipeline/graph.py`` do
# ``from models.graph_state import PipelineState``. PEP 420 namespace
# packaging handles it: the directory is installed as an implicit
# namespace package and ``from models.X import Y`` resolves. Setuptools
# may emit a ``UserWarning`` about the missing ``__init__.py`` â€” that's
# cosmetic, NOT a build failure.
# ---------------------------------------------------------------------------
[tool.setuptools.packages.find]
where = ["."]
include = [
    "apply_worker*",
    "cache*",
    "db*",
    "models*",
    "pipeline*",
    "routes*",
    "services*",
    "utils*",
]
exclude = [
    "data",
    "data*",
    "scripts",
    "scripts*",
    "tests",
    "tests*",
    "storage",
    "storage*",
]  

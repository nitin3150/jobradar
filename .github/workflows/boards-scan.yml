# .github/workflows/boards-scan.yml
#
# JobRadar boards-scan orchestrator — runs the boards runner
# directly inside the GitHub Actions worker. No backend deploy
# required.
#
# Why "in the worker" instead of POSTing to a backend
# ---------------------------------------------------
# The boards runner with ``MAX_WORKERS=8`` over 10K+ orgs takes
# 20-40 minutes. Most free-tier PaaS hosts (Render free, Railway
# free, Koyeb) cap HTTP request timeouts at 30-60 seconds — the
# POST would 504 long before the scan finished. GHA's free tier
# gives 6 hours of wall-clock per job, and the worker already has
# the ``ubuntu-latest`` image, Python 3.12, and network access.
# So the cron triggers just shell out to the runner, the LLM, and
# the Supabase REST API from inside the worker, and the response
# is the JSON the script writes to stdout.
#
# The trade-off (vs. running on a persistent host)
# ------------------------------------------------
# The boards runner writes per-org dedupe state to
# ``backend/data/seen.json`` etc. on every run. In GHA that file
# is ephemeral — the next cron tick starts with an empty
# ``seen.json`` and re-processes every recent job. We bound that
# cost two ways:
#
#   1. ``--limit`` caps the per-board org count. The script's
#      argparse treats ``limit <= 0`` as "no cap" (the actual
#      ``limit > 0 else None`` branch in ``boards_scan.py`` flips
#      to ``None`` in that case), so setting ``BOARDS_LIMIT: "0"``
#      in a per-job ``env:`` block is the canonical "scrape every
#      org" signal — see the active/dormant job ``env:`` blocks
#      below for the operator's current values, and the BUDGET
#      note for the resulting cost trade-off.
#   2. ``ignore_duplicates=True`` on the Supabase upsert means
#      re-running is idempotent and never overwrites an operator's
#      prior ``approved`` / ``rejected`` decision on a row.
#
# For persistent cross-run dedupe, lift the runner onto a host
# with persistent disk (Oracle Cloud Always Free ARM is the
# recommendation — 4 cores / 24GB RAM, never expires) and have
# this workflow POST to it instead of running the runner locally.
#
# Tier semantics
# --------------
# active  : hourly scrape of "warm" orgs. 1h delta_hours.
# dormant : daily scrape of "slow" orgs. 24h delta_hours; the
#           larger window catches postings that landed during
#           off-hours UTC.
# cleanup : weekly re-probe of missing-orgs slugs against all
#           three boards. The existing
#           ``cleanup_missing_orgs.py`` CLI runs in dry-run mode
#           (probes but does not commit the verified-orgs list —
#           that requires a host with persistent disk).
#
# BUDGET — GitHub Actions free tier
# ----------------------------------
# Public-repo free tier: 2,000 minutes/month. Each cron tick
# pays a fixed ``~100s`` of setup overhead (checkout +
# setup-python + pip install) BEFORE the scan starts. With the
# defaults below, the realistic monthly breakdown is:
#
#   active  (hourly, ``--limit 50``)
#     24 jobs/day × ~125s (100s setup + 25s scan+score+persist)
#     = ~50 min/day ≈ 1,500 min/month
#   dormant (daily 02:20, ``--limit 500``)
#     1 job/day × ~210s (100s setup + 110s scan+score+persist)
#     = ~3.5 min/day ≈ 105 min/month
#   cleanup (weekly Sunday, dry-run probe)
#     1 job/week × ~700s (100s setup + 600s probe of all
#     missing slugs across three boards) ≈ 50 min/month
#     (12 min/week × ~4.3 weeks/month)
#   ---------------------------------------------
#   total                              ≈ 1,655 min/month
#
# Headroom is ~300 min/month. To stay safely under:
#
#   - Bumping ``BOARDS_LIMIT`` for active past 200 starts to
#     blow the budget — the setup is fixed, the scan scales
#     linearly.
#   - Bumping the cron to every-30-minutes doubles the
#     active-minute cost and goes over immediately.
#   - The free-tier Groq limit is 30 LLM req/min — at
#     ``--limit 50`` an hourly cron uses 50 req/hour, which
#     is comfortably under. ``--limit 500`` daily uses 500
#     req in a few seconds and is the binding ceiling for
#     the dormant tier on a free Groq key.
#
# Required GitHub Actions secrets (configure at the repo or org
# level; the workflow will fail-fast on the first 4xx if any are
# missing):
#
#   SUPABASE_URL              - e.g. https://abc.supabase.co
#                              (no trailing slash)
#   SUPABASE_SERVICE_ROLE_KEY - service_role secret from the
#                              Supabase project settings
#                              (Settings -> API). This is
#                              server-only — never expose to the
#                              React frontend.
#   GROQ_API_KEY              - Groq API key for the LLM
#                              scoring step (free tier works).
#                              NVIDIA_API_KEY is the other
#                              accepted name; the LLM client
#                              picks whichever is set.
#   STATUS_WEBHOOK_URL       - receiver for the per-tier notify
#                              payload (Slack-compatible
#                              incoming-webhook URL, or any
#                              HTTPS endpoint that accepts a
#                              JSON POST and returns 2xx).
#
# Optional workflow env vars (set per-job, not secrets):
#   LLM_PROVIDER, LLM_MODEL, TARGET_ROLES, BOARDS_DELTA_HOURS,
#   BOARDS_BOARDS, BOARDS_LIMIT, JOB_FIT_THRESHOLD — see
#   ``backend/scripts/boards_scan.py`` for the contract.
# Note: the script's argparse reads ``JOB_FIT_THRESHOLD``
# from the environment as the default for ``--threshold``
# (``os.environ.get("JOB_FIT_THRESHOLD", "0.6")``), and the
# env block below passes the value both as that env var AND
# explicitly via ``--threshold "${JOB_FIT_THRESHOLD}"`` —
# belt + suspenders, so the threshold survives a future
# accidental removal of the CLI flag.

name: boards-scan

on:
  schedule:
    # Hourly active scan — the priority list. New postings from
    # warm orgs land in the review queue within ~60 minutes
    # *when the per-job scan keeps the schedule*. NOTE: the
    # BUDGET math below is calibrated against the old
    # ``--limit 50`` and ``--limit 500`` defaults; with
    # ``BOARDS_LIMIT: "0"`` in the env block (no org cap),
    # the per-tick scan + score phase is far heavier than
    # the per-month rollup suggests. The per-job
    # ``timeout-minutes`` is the binding per-tick budget;
    # the BUDGET section is informational only — the
    # ``30`` here, the ``60`` in the dormant job below.
    - cron: "0 * * * *"
    # Daily dormant scan — the slow list. 02:20 UTC keeps it
    # off-peak and gives the 02:00 active tick a 20-min
    # headroom window to finish before dormant fires. Same
    # ``BOARDS_LIMIT: "0"`` caveat as the active cron above:
    # per-tick wall-clock is well above what the BUDGET
    # monthly rollup implies; ``timeout-minutes: 60`` below
    # is the binding per-tick budget, not the BUDGET
    # section's monthly projection.
    - cron: "20 2 * * *"
    # Weekly cleanup — re-probe missing-orgs slugs so a benign
    # outage that benched a slug doesn't keep it benched
    # forever. 04:20 UTC runs after the dormant scan. The
    # ``@weekly`` shortcut would be cleaner but GHA cron
    # doesn't support it — Sunday 04:20 UTC is the next
    # equivalent. Set to 0 0 * * 0 to shift to midnight.
    - cron: "20 4 * * 0"
  # Manual trigger so we don't have to wait for the next :00
  # UTC to verify the workflow after a config change. Picks
  # the same three tiers the schedule trigger would fire; the
  # matching job's ``if:`` block reads the input and only
  # runs when its tier matches (see each job below).
  #
  # IMPORTANT: there is NO ``on: push`` trigger — pushing the
  # workflow file does NOT fire it. Cron + manual are the
  # two ways to invoke. This is intentional: a 30-min boards
  # scan on every PR push would burn the 2,000 min/month
  # ceiling in days. If you ever want CI-style firing on
  # workflow changes only, add ``push:`` with a
  # ``paths: ['.github/workflows/boards-scan.yml']`` filter so
  # it doesn't trigger on every commit to the runner.
  workflow_dispatch:
    inputs:
      tier:
        description: >-
          Tier to run. Mirrors which cron would fire this job
          (``active`` = hourly, ``dormant`` = daily 02:20 UTC,
          ``cleanup`` = weekly Sunday 04:20 UTC). Picks the
          matching job only — other tiers stay skipped.
        required: true
        default: 'active'
        type: choice
        options:
          - active
          - dormant
          - cleanup

# Per-tier concurrency: an in-flight scan blocks the next cron
# tick of the SAME tier (so we never overlap a long scan with
# a long scan of the same tier), but the three tiers don't
# block each other. ``cancel-in-progress: false`` waits for
# the in-flight scan to finish rather than killing it
# mid-flight.
concurrency:
  group: boards-scan-${{ github.event.schedule }}
  cancel-in-progress: false

# Zero-trust GHM token scope: the workflow has no
# ``actions/checkout`` consumer beyond the default (and we
# explicitly grant nothing so a future maintainer who adds a
# writeable step will need to opt in to a scope here — that
# loud failure is the point).
permissions: {}

jobs:
  # -----------------------------------------------------------------
  # Active tier — hourly, 1h lookback, no per-board org cap.
  # ``BOARDS_LIMIT: "0"`` in the env block below means the
  # script's ``limit > 0 else None`` branch fires and iterates
  # every org in the per-board JSON files (~10K orgs total
  # across ashby/greenhouse/lever). The 1h ``BOARDS_DELTA_HOURS``
  # bounds only the per-org BOARD-API payload, not the LLM
  # scoring + Supabase upsert which dominate the wall-clock.
  # -----------------------------------------------------------------
  scan-active:
    # Run on the matching hourly cron OR when ``workflow_dispatch``
    # picks tier=active. The OR is on a single line because GHA's
    # ``if:`` expression renderer doesn't re-fold YAML multiline
    # scalars fine enough — keeping it on one line avoids the
    # subtle parser quirk where a folded multi-line condition ends
    # up with an invisible extra space and fails to match.
    if: (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || (github.event_name == 'workflow_dispatch' && inputs.tier == 'active')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BOARDS_DELTA_HOURS: "1"
      BOARDS_BOARDS: "ashby greenhouse lever"
      # ``BOARDS_LIMIT: "0"`` means the script's ``limit > 0 else None``
      # branch fires, iterating every org in the per-board JSON files
      # (~10K orgs across ashby/greenhouse/lever). Combined with GHA's
      # ephemeral ``seen.json`` this rescores the recent window every
      # cron tick — expensive, but intentional for the operator.
      BOARDS_LIMIT: "0"
      # Name matches the script's argparse read for
      # ``--threshold`` (``os.environ.get("JOB_FIT_THRESHOLD",
      # "0.6")``). Stricter than that 0.6 default so the
      # bigger org set doesn't drown the review queue; tune
      # here, NOT in the script.
      JOB_FIT_THRESHOLD: "0.7"
      # Supabase REST auth — supabase-py reads these from the process
      # env at startup; missing or wrong values make every REST write
      # 401 with "Invalid API key" (PostgREST layer). The actual
      # values live in repo Settings → Secrets and variables → Actions
      # — NOT here in plaintext.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      # Fail-fast: lint the four required secrets BEFORE checkout
      # so a misconfigured repo fails in ~2 s instead of ~30 s of
      # checkout + pip install. ``toJson(secrets)`` produces an
      # object keyed by every SET secret with values masked to
      # "***"; unset secrets simply don't appear, so ``jq has($n)``
      # is the right probe. Secret VALUES never appear in
      # ``::error::`` annotations — only the named MISSING list.
      #
      # ``OPTIONAL_SECRETS`` is a parallel array for secrets that
      # SHOULD be set for the doubled-RPM bonus but are not
      # load-bearing: the LLM client (``from_env``) treats an
      # unset / empty secret as "skip this key" via its
      # ``if value:`` guard, so the chain still works. We emit a
      # ``::warning::`` (not ``::error::``) so a repo that hasn't
      # set NVIDIA_API_KEY_2 yet doesn't fail the cron — the
      # warning surfaces in the GHA run summary so the operator
      # notices the throughput headroom they're leaving on the
      # table.
      - name: Lint required secrets
        id: secrets-lint
        # 1-minute budget keeps a hung ``jq`` (extremely rare)
        # from burning the 30/60-min job limit. The actual script
        # runs in <500 ms — the cap is a safety belt, not a
        # pacing knob.
        timeout-minutes: 1
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -euo pipefail
          MISSING=()
          for NAME in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GROQ_API_KEY NVIDIA_API_KEY; do
            if ! echo "$SECRETS_JSON" | jq -e --arg n "$NAME" 'has($n)' > /dev/null; then
              MISSING+=("$NAME")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            {
              echo "::error title=Missing required GHA secrets::${MISSING[*]}"
              for M in "${MISSING[@]}"; do
                echo "::error::  - $M"
              done
              echo "::error::Add them at: https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            } >&2
            exit 1
          fi
          # Optional secrets — emit a warning (not an error) if
          # missing so the operator notices the bonus they're
          # missing without failing the cron. The LLM client
          # gracefully degrades to the single-key chain.
          OPTIONAL=("NVIDIA_API_KEY_2")
          for NAME in "${OPTIONAL[@]}"; do
            if ! echo "$SECRETS_JSON" | jq -e --arg n "$NAME" 'has($n)' > /dev/null; then
              echo "::warning title=Optional GHA secret not set::$NAME (LLM client will use the single-key chain; add at https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions for doubled RPM throughput)"
            fi
          done
          echo "All required secrets are set."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # ``pip install -e .`` honours ``pyproject.toml`` and
          # pulls every dep the boards runner + LLM client +
          # supabase-py need. The boards runner imports
          # ``routes.settings`` so an editable install is
          # load-bearing (not a flat ``pip install -r
          # requirements.txt``).
          pip install -e .

      - name: Run boards scan (active tier)
        id: scan
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # ``NVIDIA_API_KEY_2`` is the optional second-key slot
          # for operators with two NIM keys. The LLM client
          # (``services.llm_client.LLMClient.from_env``) picks up
          # both keys when set, dedupes the shared token bucket
          # (sized at ``len(keys) * 40 RPM``), and walks the chain
          # ``[nvidia, nvidia_2, groq]`` on per-key failure. An
          # unset secret here resolves to empty string in the env,
          # which :func:`from_env`'s ``if value:`` guard filters
          # out — so operators who don't set NVIDIA_API_KEY_2
          # still get the single-key chain unchanged. Linted as
          # OPTIONAL in the ``Lint required secrets`` step above
          # (a missing secret emits a ``::warning::`` rather than
          # failing the cron).
          NVIDIA_API_KEY_2: ${{ secrets.NVIDIA_API_KEY_2 }}
          # ``PYTHONUNBUFFERED=1`` so the script's
          # ``print(..., flush=True)`` reaches the GHA run
          # log incrementally rather than buffering until
          # job end. The cleanup step declares the same env
          # var explicitly; setting it here too keeps the
          # three jobs uniform.
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          # The script writes a structured one-line summary
          # to stdout on every run; no ``set -x`` because the
          # GHA run log is storage quota, not a debug
          # terminal.
          python scripts/boards_scan.py \
            --delta-hours "${BOARDS_DELTA_HOURS}" \
            --boards ${BOARDS_BOARDS} \
            --limit "${BOARDS_LIMIT}" \
            --threshold "${JOB_FIT_THRESHOLD}"

      - name: Notify status
        # The ``secrets`` context is NOT available in ``if:``
        # expressions (GHA returns ``Unrecognized named-value:
        # 'secrets'`` at render time), so the webhook-empty skip
        # is implemented inside ``run:`` as an explicit
        # ``exit 0`` rather than gating the step on an ``if:``
        # predicate. A job-level ``env:`` block WOULD make the
        # secret available in ``if:`` but at the cost of exposing
        # the URL value to every step's env lookups, so the
        # step-level ``env:`` + bash-side guard is the better
        # isolation: a misconfigured cron stays ``success``
        # instead of failing on an empty curl URL.
        if: always()
        env:
          STATUS_WEBHOOK_URL: ${{ secrets.STATUS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          # ``${VAR:-}`` defaults to empty under ``set -u`` when
          # the secret is unset, so this guard cleanly no-ops
          # the webhook call without a noisy traceback.
          if [ -z "${STATUS_WEBHOOK_URL:-}" ]; then
            echo "STATUS_WEBHOOK_URL is unset; skipping notify."
            exit 0
          fi
          # Compact one-liner JSON payload via ``jq``. ``conclusion``
          # is one of success / failure / cancelled / skipped — the
          # RECEIVER should treat ``conclusion: failure`` as the
          # canonical "did it work?" signal because the scan
          # step's outputs may be empty on early-exit (e.g. a
          # boards-runner crash before the GITHUB_OUTPUT line
          # ran). ``tier`` tells the receiver which cron fired.
          payload=$(jq -n \
            --arg     tier          "active" \
            --arg     conclusion    "${{ steps.scan.conclusion }}" \
            --arg     workflow      "${{ github.workflow }}" \
            --argjson run_id        "${{ github.run_id }}" \
            --argjson run_attempt   "${{ github.run_attempt }}" \
            '{tier: $tier, conclusion: $conclusion, workflow: $workflow, run_id: $run_id, run_attempt: $run_attempt}')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${STATUS_WEBHOOK_URL}"

  # -----------------------------------------------------------------
  # Dormant tier — daily 02:20 UTC, 24h lookback, no per-board
  # org cap (``BOARDS_LIMIT: "0"`` in the env block below).
  # The 24h ``BOARDS_DELTA_HOURS`` covers the previous-day
  # posting window across the full per-board list; once-a-day
  # cadence is the only reason this stays under GHA's
  # ``timeout-minutes: 60`` budget.
  # -----------------------------------------------------------------
  scan-dormant:
    if: (github.event_name == 'schedule' && github.event.schedule == '20 2 * * *') || (github.event_name == 'workflow_dispatch' && inputs.tier == 'dormant')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BOARDS_DELTA_HOURS: "24"
      BOARDS_BOARDS: "ashby greenhouse lever"
      BOARDS_LIMIT: "0"
      JOB_FIT_THRESHOLD: "0.7"
      # Supabase REST auth — supabase-py reads these from the process
      # env at startup; missing or wrong values make every REST write
      # 401 with "Invalid API key" (PostgREST layer). The actual
      # values live in repo Settings → Secrets and variables → Actions
      # — NOT here in plaintext.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      # Fail-fast: same secrets-lint as active (see comment there).
      # Duplicated inline because we want the check to run BEFORE
      # checkout — composite actions can't reference ``secrets``
      # without a prior checkout, which would defeat the fail-fast
      # goal. If a third consumer ever needs the same lint, factor
      # into a **reusable workflow** at
      # ``.github/workflows/_secrets-lint.yml`` rather than a
      # composite action — reusable workflows are loaded from
      # GitHub remote and CAN run before checkout, inverse of the
      # composite-action constraint. The caller still needs
      # ``secrets: inherit`` on the ``uses:`` line, otherwise
      # ``toJson(secrets)`` in the called workflow returns ``{}``
      # and the lint false-positives every required name.
      #
      # ``OPTIONAL_SECRETS`` is the same pattern as the active
      # tier — ``NVIDIA_API_KEY_2`` gets a ``::warning::`` if
      # missing rather than failing the cron. The LLM client
      # degrades to the single-key chain.
      - name: Lint required secrets
        id: secrets-lint
        # 1-minute budget keeps a hung ``jq`` (extremely rare)
        # from burning the 30/60-min job limit. The actual script
        # runs in <500 ms — the cap is a safety belt, not a
        # pacing knob.
        timeout-minutes: 1
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -euo pipefail
          MISSING=()
          for NAME in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GROQ_API_KEY NVIDIA_API_KEY; do
            if ! echo "$SECRETS_JSON" | jq -e --arg n "$NAME" 'has($n)' > /dev/null; then
              MISSING+=("$NAME")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            {
              echo "::error title=Missing required GHA secrets::${MISSING[*]}"
              for M in "${MISSING[@]}"; do
                echo "::error::  - $M"
              done
              echo "::error::Add them at: https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            } >&2
            exit 1
          fi
          # Optional secrets — emit a warning (not an error) if
          # missing so the operator notices the bonus they're
          # missing without failing the cron. The LLM client
          # gracefully degrades to the single-key chain.
          OPTIONAL=("NVIDIA_API_KEY_2")
          for NAME in "${OPTIONAL[@]}"; do
            if ! echo "$SECRETS_JSON" | jq -e --arg n "$NAME" 'has($n)' > /dev/null; then
              echo "::warning title=Optional GHA secret not set::$NAME (LLM client will use the single-key chain; add at https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions for doubled RPM throughput)"
            fi
          done
          echo "All required secrets are set."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run boards scan (dormant tier)
        id: scan
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # Optional second NVIDIA NIM key — see the matching
          # comment in the active tier above. Same dedupe +
          # empty-string fallback rationale.
          NVIDIA_API_KEY_2: ${{ secrets.NVIDIA_API_KEY_2 }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python scripts/boards_scan.py \
            --delta-hours "${BOARDS_DELTA_HOURS}" \
            --boards ${BOARDS_BOARDS} \
            --limit "${BOARDS_LIMIT}" \
            --threshold "${JOB_FIT_THRESHOLD}"

      - name: Notify status
        # The ``secrets`` context is NOT available in ``if:``
        # expressions (GHA returns ``Unrecognized named-value:
        # 'secrets'`` at render time), so the webhook-empty skip
        # is implemented inside ``run:`` as an explicit
        # ``exit 0`` rather than gating the step on an ``if:``
        # predicate. A job-level ``env:`` block WOULD make the
        # secret available in ``if:`` but at the cost of exposing
        # the URL value to every step's env lookups, so the
        # step-level ``env:`` + bash-side guard is the better
        # isolation: a misconfigured cron stays ``success``
        # instead of failing on an empty curl URL.
        if: always()
        env:
          STATUS_WEBHOOK_URL: ${{ secrets.STATUS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          # ``${VAR:-}`` defaults to empty under ``set -u`` when
          # the secret is unset, so this guard cleanly no-ops
          # the webhook call without a noisy traceback.
          if [ -z "${STATUS_WEBHOOK_URL:-}" ]; then
            echo "STATUS_WEBHOOK_URL is unset; skipping notify."
            exit 0
          fi
          payload=$(jq -n \
            --arg     tier          "dormant" \
            --arg     conclusion    "${{ steps.scan.conclusion }}" \
            --arg     workflow      "${{ github.workflow }}" \
            --argjson run_id        "${{ github.run_id }}" \
            --argjson run_attempt   "${{ github.run_attempt }}" \
            '{tier: $tier, conclusion: $conclusion, workflow: $workflow, run_id: $run_id, run_attempt: $run_attempt}')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${STATUS_WEBHOOK_URL}"

  # -----------------------------------------------------------------
  # Cleanup tier — weekly Sunday 04:20 UTC. Re-probes the
  # ``<board>_missing_orgs.json`` slugs against all three boards
  # via the existing ``cleanup_missing_orgs.py`` CLI. Runs in
  # default dry-run mode (probes but doesn't commit
  # ``verified_org_targets.json`` — that requires a host with
  # persistent disk). The dry-run output goes to stdout so
  # the run log shows which slugs were re-verified.
  # -----------------------------------------------------------------
  scan-cleanup:
    if: (github.event_name == 'schedule' && github.event.schedule == '20 4 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.tier == 'cleanup')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # The cleanup CLI only needs ``httpx`` + the
          # ``utils.time_check`` / ``utils.http`` helpers, but
          # ``pip install -e .`` is the simplest reproducible
          # command and pays the same one-time install cost.
          pip install -e .

      - name: Run boards cleanup (dry-run)
        id: scan
        working-directory: backend
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          # ``--no-resume`` ignores the on-disk probe cache so
          # every cleanup run re-probes from scratch (the cache
          # is ephemeral in GHA anyway). Default mode is
          # dry-run — the CLI prints the verification summary
          # to stdout without writing
          # ``verified_org_targets.json``.
          python -m pipeline.nodes.jobs_boards.cleanup_missing_orgs --no-resume

      - name: Notify status
        # The ``secrets`` context is NOT available in ``if:``
        # expressions (GHA returns ``Unrecognized named-value:
        # 'secrets'`` at render time), so the webhook-empty skip
        # is implemented inside ``run:`` as an explicit
        # ``exit 0`` rather than gating the step on an ``if:``
        # predicate. A job-level ``env:`` block WOULD make the
        # secret available in ``if:`` but at the cost of exposing
        # the URL value to every step's env lookups, so the
        # step-level ``env:`` + bash-side guard is the better
        # isolation: a misconfigured cron stays ``success``
        # instead of failing on an empty curl URL.
        if: always()
        env:
          STATUS_WEBHOOK_URL: ${{ secrets.STATUS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          # ``${VAR:-}`` defaults to empty under ``set -u`` when
          # the secret is unset, so this guard cleanly no-ops
          # the webhook call without a noisy traceback.
          if [ -z "${STATUS_WEBHOOK_URL:-}" ]; then
            echo "STATUS_WEBHOOK_URL is unset; skipping notify."
            exit 0
          fi
          payload=$(jq -n \
            --arg     tier          "cleanup" \
            --arg     conclusion    "${{ steps.scan.conclusion }}" \
            --arg     workflow      "${{ github.workflow }}" \
            --argjson run_id        "${{ github.run_id }}" \
            --argjson run_attempt   "${{ github.run_attempt }}" \
            '{tier: $tier, conclusion: $conclusion, workflow: $workflow, run_id: $run_id, run_attempt: $run_attempt}')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${STATUS_WEBHOOK_URL}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fundingradar
      POSTGRES_USER: fundingradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundingradar"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fundingradar:${POSTGRES_PASSWORD:-secret}@postgres:5432/fundingradar
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  apply-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python apply_worker/main.py
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LLM_API_KEY=${LLM_API_KEY}
      - QA_MATCH_THRESHOLD=${QA_MATCH_THRESHOLD:-0.75}
      - APPLY_WORKER_SCREENSHOT_DIR=/app/screenshots
    volumes:
      - screenshots:/app/screenshots
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  screenshots:
